<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth_verify_page_title">تأكيد الحساب | دايكو</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-glow-1"></div>
    <div class="auth-glow-2"></div>
    <div class="auth-glow-3"></div>

    <div class="auth-card">
      <!-- Registration Progress Indicator — Step 2 of 3 (brief §4 AUTH) -->
      <div class="auth-progress">
        <div class="auth-progress-step completed">
          <div class="auth-progress-dot">✓</div>
          <span data-i18n="auth_verify_step1">التسجيل</span>
        </div>
        <div class="auth-progress-line completed"></div>
        <div class="auth-progress-step active">
          <div class="auth-progress-dot">2</div>
          <span data-i18n="auth_verify_step2">التفعيل</span>
        </div>
        <div class="auth-progress-line"></div>
        <div class="auth-progress-step">
          <div class="auth-progress-dot">3</div>
          <span data-i18n="auth_verify_step3">الإتمام</span>
        </div>
      </div>

      <div class="auth-header">
        <div class="auth-logo">
          <img src="../images/daico-logo.png" alt="شعار دايكو" class="daico-logo" width="32" height="32" style="border-radius: 4px; object-fit: cover;">
          <span data-i18n="auth_brand">دايكو DAICO</span>
        </div>
        <h1 class="auth-title" data-i18n="auth_verify_heading">تفعيل الحساب والبريد</h1>
        <p class="auth-subtitle"><span data-i18n="auth_verify_desc_text">أدخل الرمز المكون من 4 أرقام المرسل إلى:</span> <br><strong id="target-email" style="color:var(--text-primary)">-</strong></p>
      </div>

      <div id="auth-alert-container"></div>

      <!-- Developer Bypass Info Banner (Active only on local prototype) -->
      <div id="dev-bypass-container" style="margin-top: 15px; display: none;">
        <div style="background: rgba(14, 128, 116, 0.08); border: 1.5px dashed rgba(14, 128, 116, 0.4); border-radius: 12px; padding: 12px; font-size: 13.5px; text-align: center; color: #0e8074; backdrop-filter: blur(8px); margin-bottom: 20px; transition: all 0.3s ease;">
          <div style="font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; gap: 6px;">
            <span>⚡ وضع التجربة السريعة (Prototype Mode)</span>
          </div>
          <span>رمز التفعيل الحالي للحساب: <strong id="dev-otp-code" style="font-size: 17px; letter-spacing: 1.5px; text-decoration: underline; cursor: pointer; color: #2a86c7; font-family: monospace;">-</strong></span>
          <br>
          <span style="font-size: 11px; opacity: 0.8; margin-top: 4px; display: inline-block;">(اضغط على الرمز الأزرق أعلاه لتعبئته وتفعيل الحساب تلقائياً)</span>
        </div>
      </div>

      <form class="auth-form" id="verify-form">
        <!-- OTP Pin fields -->
        <div class="pin-container">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem" data-i18n="auth_verify_btn">تفعيل الحساب</button>
      </form>

      <div class="auth-links">
        <span><span data-i18n="auth_verify_no_code">لم يصلك الرمز؟</span> <a href="#" id="resend-btn" data-i18n="auth_verify_resend">أعد إرسال الرمز (OTP)</a></span>
      </div>
    </div>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Read email query parameter
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email') || '';
      document.getElementById('target-email').innerText = email;

      const alerts = document.getElementById('auth-alert-container');
      const pinInputs = document.querySelectorAll('.pin-input');
      const form = document.getElementById('verify-form');

      // Display professional user-friendly message
      alerts.innerHTML = `<div class="alert alert-success">${window.DAICO_I18N.t('auth_verify_success_sent')}</div>`;

      // Auto focus jump inside OTP boxes and key/paste handling
      pinInputs.forEach((input, index) => {
        // Enforce numeric only and focus next box
        input.addEventListener('input', (e) => {
          const val = input.value;
          if (val && !/^[0-9]$/.test(val)) {
            input.value = '';
            return;
          }
          if (val.length === 1 && index < pinInputs.length - 1) {
            pinInputs[index + 1].focus();
          }
          checkAndAutoSubmit();
        });

        // Keydown handler for backspace and focus previous
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace') {
            if (input.value.length === 0 && index > 0) {
              pinInputs[index - 1].focus();
              pinInputs[index - 1].value = '';
            } else {
              input.value = '';
            }
            e.preventDefault();
            checkAndAutoSubmit();
          }
        });

        // Paste support: paste 4 digit code directly
        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const pastedData = (e.clipboardData || window.clipboardData).getData('text').trim();
          if (/^\d{4}$/.test(pastedData)) {
            pinInputs.forEach((pinIn, idx) => {
              pinIn.value = pastedData[idx];
            });
            pinInputs[pinInputs.length - 1].focus();
            checkAndAutoSubmit();
          }
        });
      });

      function checkAndAutoSubmit() {
        let pin = '';
        pinInputs.forEach(i => pin += i.value);
        if (pin.length === 4) {
          form.dispatchEvent(new Event('submit'));
        }
      }

      // Check if user has an active code in the local DB for quick developer test mode
      function updateDevBypass() {
        if (window.DAICO_DB) {
          const user = window.DAICO_DB.selectOne('users', { email: email.toLowerCase() });
          if (user && !user.verified && user.verification_code) {
            const devContainer = document.getElementById('dev-bypass-container');
            const devOtp = document.getElementById('dev-otp-code');
            if (devContainer && devOtp) {
              devOtp.innerText = user.verification_code;
              devContainer.style.display = 'block';
            }
          }
        }
      }

      updateDevBypass();

      // Bind click on dev OTP code
      const devOtp = document.getElementById('dev-otp-code');
      if (devOtp) {
        devOtp.addEventListener('click', () => {
          if (window.DAICO_DB) {
            const user = window.DAICO_DB.selectOne('users', { email: email.toLowerCase() });
            if (user && user.verification_code) {
              const codeStr = user.verification_code.toString();
              pinInputs.forEach((pinIn, idx) => {
                pinIn.value = codeStr[idx] || '';
              });
              const devContainer = document.getElementById('dev-bypass-container');
              if (devContainer) {
                devContainer.style.background = 'rgba(16, 185, 129, 0.12)';
                devContainer.style.borderColor = '#10b981';
              }
              devOtp.style.color = '#10b981';
              setTimeout(() => {
                form.dispatchEvent(new Event('submit'));
              }, 300);
            }
          }
        });
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alerts.innerHTML = '';

        // Combine fields
        let pin = '';
        pinInputs.forEach(i => pin += i.value);

        // Verification mock
        const res = window.DAICO_AUTH.verifyEmail(email, pin);

        if (res.success) {
          alerts.innerHTML = `<div class="alert alert-success">${window.DAICO_I18N.t('auth_verify_success_activated')}</div>`;
          setTimeout(() => {
            window.location.href = '../user/index.html';
          }, 1500);
        } else {
          alerts.innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
        }
      });

      // Resend OTP real implementation
      document.getElementById('resend-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        alerts.innerHTML = '';
        
        alerts.innerHTML = `<div class="alert alert-success">${window.DAICO_I18N.t('auth_verify_generating_new')}</div>`;
        
        const res = await window.DAICO_AUTH.resendVerificationCode(email);
        if (res.success) {
          alerts.innerHTML = `<div class="alert alert-success">${res.message}</div>`;
          updateDevBypass();
        } else {
          alerts.innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
        }
      });
    });
  </script>
</body>
</html>
