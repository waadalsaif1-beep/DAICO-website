<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد الحساب | دايكو</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-glow-1"></div>
    <div class="auth-glow-2"></div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="32" height="32" class="daico-logo">
            <defs>
              <linearGradient id="grad-top-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#5ec2f6" />
                <stop offset="100%" stop-color="#2a86c7" />
              </linearGradient>
              <linearGradient id="grad-top-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3ba8e8" />
                <stop offset="100%" stop-color="#1e6091" />
              </linearGradient>
              <linearGradient id="grad-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a3e635" />
                <stop offset="100%" stop-color="#65a30d" />
              </linearGradient>
              <linearGradient id="grad-bottom-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" />
                <stop offset="100%" stop-color="#047857" />
              </linearGradient>
              <linearGradient id="grad-bottom-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f97316" />
                <stop offset="100%" stop-color="#b91c1c" />
              </linearGradient>
              <linearGradient id="grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#facc15" />
                <stop offset="100%" stop-color="#ea580c" />
              </linearGradient>
              <linearGradient id="grad-u-shape" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9" />
                <stop offset="100%" stop-color="#0284c7" />
              </linearGradient>
            </defs>
            <path d="M 48,108 L 100,138 L 152,108 L 152,150 A 52,52 0 0,1 48,150 Z" fill="url(#grad-u-shape)" />
            <path d="M 100,10 L 48,40 L 90,53 Z" fill="url(#grad-top-left)" />
            <path d="M 100,10 L 110,53 L 152,40 Z" fill="url(#grad-top-right)" />
            <path d="M 152,40 L 120,70 L 152,100 Z" fill="url(#grad-right)" />
            <path d="M 152,100 L 110,87 L 100,130 Z" fill="url(#grad-bottom-right)" />
            <path d="M 100,130 L 90,87 L 48,100 Z" fill="url(#grad-bottom-left)" />
            <path d="M 48,100 L 80,70 L 48,40 Z" fill="url(#grad-left)" />
          </svg>
          <span>دايكو DAICO</span>
        </div>
        <h1 class="auth-title">تفعيل الحساب والبريد</h1>
        <p class="auth-subtitle">أدخل الرمز المكون من 4 أرقام المرسل إلى: <br><strong id="target-email" style="color:var(--text-primary)">-</strong></p>
      </div>

      <div id="auth-alert-container"></div>

      <form class="auth-form" id="verify-form">
        <!-- OTP Pin fields -->
        <div class="pin-container">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
          <input type="text" class="pin-input" maxlength="1" required pattern="[0-9]">
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem">تفعيل الحساب</button>
      </form>

      <div class="auth-links">
        <span>لم يصلك الرمز؟ <a href="#" id="resend-btn">أعد إرسال الرمز (OTP)</a></span>
      </div>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Read email query parameter
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email') || '';
      document.getElementById('target-email').innerText = email;

      const alerts = document.getElementById('auth-alert-container');
      const pinInputs = document.querySelectorAll('.pin-input');
      const form = document.getElementById('verify-form');

      // Display initial helper alert showing the mock verification pin
      alerts.innerHTML = `<div class="alert alert-success">تم إرسال رمز التفعيل التجريبي: <strong>1234</strong> (أو يمكنك كتابة أي 4 أرقام للتفعيل).</div>`;

      // Auto focus jump inside OTP boxes
      pinInputs.forEach((input, index) => {
        input.addEventListener('keyup', (e) => {
          if (e.target.value.length === 1 && index < pinInputs.length - 1) {
            pinInputs[index + 1].focus();
          }
        });
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alerts.innerHTML = '';

        // Combine fields
        let pin = '';
        pinInputs.forEach(i => pin += i.value);

        // Verification mock
        const res = window.DAICO_AUTH.verifyEmail(email, pin);

        if (res.success) {
          alerts.innerHTML = `<div class="alert alert-success">تم تفعيل حسابك بنجاح! جاري تسجيل الدخول...</div>`;
          setTimeout(() => {
            window.location.href = '../user/index.html';
          }, 1500);
        } else {
          alerts.innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
        }
      });

      // Resend OTP mock trigger
      document.getElementById('resend-btn').addEventListener('click', (e) => {
        e.preventDefault();
        alerts.innerHTML = `<div class="alert alert-success">تمت إعادة إرسال رمز التفعيل بنجاح (الرمز للتجربة: أي 4 أرقام).</div>`;
      });
    });
  </script>
</body>
</html>
