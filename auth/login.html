<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | منصة دايكو</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-glow-1"></div>
    <div class="auth-glow-2"></div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="32" height="32" class="daico-logo">
            <defs>
              <linearGradient id="grad-top-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#5ec2f6" />
                <stop offset="100%" stop-color="#2a86c7" />
              </linearGradient>
              <linearGradient id="grad-top-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3ba8e8" />
                <stop offset="100%" stop-color="#1e6091" />
              </linearGradient>
              <linearGradient id="grad-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a3e635" />
                <stop offset="100%" stop-color="#65a30d" />
              </linearGradient>
              <linearGradient id="grad-bottom-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" />
                <stop offset="100%" stop-color="#047857" />
              </linearGradient>
              <linearGradient id="grad-bottom-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f97316" />
                <stop offset="100%" stop-color="#b91c1c" />
              </linearGradient>
              <linearGradient id="grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#facc15" />
                <stop offset="100%" stop-color="#ea580c" />
              </linearGradient>
              <linearGradient id="grad-u-shape" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9" />
                <stop offset="100%" stop-color="#0284c7" />
              </linearGradient>
            </defs>
            <path d="M 48,108 L 100,138 L 152,108 L 152,150 A 52,52 0 0,1 48,150 Z" fill="url(#grad-u-shape)" />
            <path d="M 100,10 L 48,40 L 90,53 Z" fill="url(#grad-top-left)" />
            <path d="M 100,10 L 110,53 L 152,40 Z" fill="url(#grad-top-right)" />
            <path d="M 152,40 L 120,70 L 152,100 Z" fill="url(#grad-right)" />
            <path d="M 152,100 L 110,87 L 100,130 Z" fill="url(#grad-bottom-right)" />
            <path d="M 100,130 L 90,87 L 48,100 Z" fill="url(#grad-bottom-left)" />
            <path d="M 48,100 L 80,70 L 48,40 Z" fill="url(#grad-left)" />
          </svg>
          <span>دايكو DAICO</span>
        </div>
        <h1 class="auth-title">تسجيل الدخول للمنصة</h1>
        <p class="auth-subtitle">أهلاً بك مجدداً! الرجاء إدخال بياناتك للمتابعة.</p>
      </div>

      <!-- Live alerts -->
      <div id="auth-alert-container"></div>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">البريد الإلكتروني</label>
          <input type="email" id="login-email" class="form-control" placeholder="name@daico.edu.sa" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">كلمة المرور</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="auth-options">
          <label class="checkbox-group">
            <input type="checkbox" id="remember-me">
            <span>تذكرني على هذا الجهاز</span>
          </label>
          <a href="forgot-password.html">نسيت كلمة المرور؟</a>
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem">الدخول الآمن</button>
      </form>

      <div class="auth-links">
        <span>ليس لديك حساب بعد؟ <a href="register.html">سجل حساباً جديداً</a></span>
        <div style="margin-top:var(--space-md)">
          <a href="../index.html" style="font-size:0.85rem; color:var(--text-muted)">← العودة للصفحة الرئيسية</a>
        </div>
      </div>
    </div>
  </div>

  <!-- JS Core files -->
  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect to dashboard immediately if already logged in
      window.DAICO_AUTH.redirectIfLoggedIn();

      const form = document.getElementById('login-form');
      const alerts = document.getElementById('auth-alert-container');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alerts.innerHTML = ''; // reset alert

        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;

        const res = window.DAICO_AUTH.login(email, pass);

        if (res.success) {
          // Success alert
          alerts.innerHTML = `<div class="alert alert-success">تم التحقق بنجاح! جاري تحويلك...</div>`;
          
          setTimeout(() => {
            if (res.user.role === 'admin' || res.user.role === 'super_admin') {
              window.location.href = '../admin/index.html';
            } else {
              window.location.href = '../user/index.html';
            }
          }, 1000);
        } else {
          // Fail alert
          if (res.unverified) {
            alerts.innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
            setTimeout(() => {
              window.location.href = `verify-email.html?email=${encodeURIComponent(res.email)}`;
            }, 2500);
          } else {
            alerts.innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
          }
        }
      });
    });
  </script>
</body>
</html>
