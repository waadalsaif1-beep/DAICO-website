<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth_forgot_page_title">استعادة كلمة المرور | دايكو</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-glow-1"></div>
    <div class="auth-glow-2"></div>
    <div class="auth-glow-3"></div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="32" height="32" class="daico-logo">
            <defs>
              <linearGradient id="grad-top-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#5ec2f6" />
                <stop offset="100%" stop-color="#2a86c7" />
              </linearGradient>
              <linearGradient id="grad-top-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3ba8e8" />
                <stop offset="100%" stop-color="#1e6091" />
              </linearGradient>
              <linearGradient id="grad-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a3e635" />
                <stop offset="100%" stop-color="#65a30d" />
              </linearGradient>
              <linearGradient id="grad-bottom-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" />
                <stop offset="100%" stop-color="#047857" />
              </linearGradient>
              <linearGradient id="grad-bottom-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f97316" />
                <stop offset="100%" stop-color="#b91c1c" />
              </linearGradient>
              <linearGradient id="grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#facc15" />
                <stop offset="100%" stop-color="#ea580c" />
              </linearGradient>
              <linearGradient id="grad-u-shape" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9" />
                <stop offset="100%" stop-color="#0284c7" />
              </linearGradient>
            </defs>
            <path d="M 48,108 L 100,138 L 152,108 L 152,150 A 52,52 0 0,1 48,150 Z" fill="url(#grad-u-shape)" />
            <path d="M 100,10 L 48,40 L 90,53 Z" fill="url(#grad-top-left)" />
            <path d="M 100,10 L 110,53 L 152,40 Z" fill="url(#grad-top-right)" />
            <path d="M 152,40 L 120,70 L 152,100 Z" fill="url(#grad-right)" />
            <path d="M 152,100 L 110,87 L 100,130 Z" fill="url(#grad-bottom-right)" />
            <path d="M 100,130 L 90,87 L 48,100 Z" fill="url(#grad-bottom-left)" />
            <path d="M 48,100 L 80,70 L 48,40 Z" fill="url(#grad-left)" />
          </svg>
          <span data-i18n="auth_brand">دايكو DAICO</span>
        </div>
        <h1 class="auth-title" data-i18n="auth_forgot_title">استعادة كلمة المرور</h1>
        <p class="auth-subtitle" data-i18n="auth_forgot_desc">أدخل بريدك الإلكتروني المسجل وسنقوم بإرسال رابط إعادة تعيين كلمة المرور.</p>
      </div>

      <div id="auth-alert-container"></div>

      <form class="auth-form" id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="forgot-email" data-i18n="auth_forgot_email_label">البريد الإلكتروني المسجل</label>
          <input type="email" id="forgot-email" class="form-control" placeholder="name@domain.com" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem" data-i18n="auth_btn_send_reset">إرسال رابط الاستعادة</button>
      </form>

      <div class="auth-links">
        <span><span data-i18n="auth_forgot_remembered">تذكرت كلمة المرور؟</span> <a href="login.html" data-i18n="btn_login">تسجيل الدخول</a></span>
      </div>
    </div>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/db.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('forgot-form');
      const alerts = document.getElementById('auth-alert-container');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alerts.innerHTML = '';

        const email = document.getElementById('forgot-email').value;
        const user = window.DAICO_DB.selectOne('users', { email: email.toLowerCase() });

        if (user) {
          alerts.innerHTML = `<div class="alert alert-success">${window.DAICO_I18N.t('auth_forgot_success')}</div>`;
          form.reset();
        } else {
          alerts.innerHTML = `<div class="alert alert-danger">${window.DAICO_I18N.t('auth_forgot_error')}</div>`;
        }
      });
    });
  </script>
</body>
</html>
