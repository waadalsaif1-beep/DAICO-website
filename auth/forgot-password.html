<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth_forgot_page_title">استعادة كلمة المرور | دايكو</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-glow-1"></div>
    <div class="auth-glow-2"></div>
    <div class="auth-glow-3"></div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <img src="../images/daico-logo.png" alt="شعار دايكو" class="daico-logo" width="24" height="24" style="border-radius: 4px; object-fit: cover;">
          <span data-i18n="auth_brand">دايكو DAICO</span>
        </div>
        <h1 class="auth-title" data-i18n="auth_forgot_title">استعادة كلمة المرور</h1>
        <p class="auth-subtitle" data-i18n="auth_forgot_desc">أدخل بريدك الإلكتروني المسجل وسنقوم بإرسال رابط إعادة تعيين كلمة المرور.</p>
      </div>

      <div id="auth-alert-container"></div>

      <form class="auth-form" id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="forgot-email" data-i18n="auth_forgot_email_label">البريد الإلكتروني المسجل</label>
          <input type="email" id="forgot-email" class="form-control" placeholder="name@domain.com" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem" data-i18n="auth_btn_send_reset">إرسال رابط الاستعادة</button>
      </form>

      <div class="auth-links">
        <span><span data-i18n="auth_forgot_remembered">تذكرت كلمة المرور؟</span> <a href="login.html" data-i18n="btn_login">تسجيل الدخول</a></span>
      </div>
    </div>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/db.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('forgot-form');
      const alerts = document.getElementById('auth-alert-container');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alerts.innerHTML = '';

        const email = document.getElementById('forgot-email').value;
        const user = window.DAICO_DB.selectOne('users', { email: email.toLowerCase() });

        if (user) {
          alerts.innerHTML = `<div class="alert alert-success">${window.DAICO_I18N.t('auth_forgot_success')}</div>`;
          form.reset();
        } else {
          alerts.innerHTML = `<div class="alert alert-danger">${window.DAICO_I18N.t('auth_forgot_error')}</div>`;
        }
      });
    });
  </script>
</body>
</html>
