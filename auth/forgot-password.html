<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استعادة كلمة المرور | دايكو</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-glow-1"></div>
    <div class="auth-glow-2"></div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
          <span>دايكو DAICO</span>
        </div>
        <h1 class="auth-title">استعادة كلمة المرور</h1>
        <p class="auth-subtitle">أدخل بريدك الإلكتروني المسجل وسنقوم بإرسال رابط إعادة تعيين كلمة المرور.</p>
      </div>

      <div id="auth-alert-container"></div>

      <form class="auth-form" id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="forgot-email">البريد الإلكتروني المسجل</label>
          <input type="email" id="forgot-email" class="form-control" placeholder="name@domain.com" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem">إرسال رابط الاستعادة</button>
      </form>

      <div class="auth-links">
        <span>تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a></span>
      </div>
    </div>
  </div>

  <script src="../js/db.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('forgot-form');
      const alerts = document.getElementById('auth-alert-container');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alerts.innerHTML = '';

        const email = document.getElementById('forgot-email').value;
        const user = window.DAICO_DB.selectOne('users', { email: email.toLowerCase() });

        if (user) {
          alerts.innerHTML = `<div class="alert alert-success">تم إرسال تعليمات ورابط استعادة كلمة المرور إلى بريدك الإلكتروني. يرجى مراجعة بريدك الوارد والبريد المهمل.</div>`;
          form.reset();
        } else {
          alerts.innerHTML = `<div class="alert alert-danger">البريد الإلكتروني غير مسجل لدينا في قاعدة البيانات.</div>`;
        }
      });
    });
  </script>
</body>
</html>
