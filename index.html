<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="head_title"></title>
  <meta name="description" data-i18n-content="head_desc" content="">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Navigation Header -->
  <header class="header">
    <div class="nav-container">
      <div class="logo-container" style="display: flex; align-items: center; gap: var(--space-sm);">
        <div style="display: flex; align-items: center; gap: 8px;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="32" height="32" class="daico-logo">
            <defs>
              <linearGradient id="grad-top-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#5ec2f6" />
                <stop offset="100%" stop-color="#2a86c7" />
              </linearGradient>
              <linearGradient id="grad-top-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3ba8e8" />
                <stop offset="100%" stop-color="#1e6091" />
              </linearGradient>
              <linearGradient id="grad-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a3e635" />
                <stop offset="100%" stop-color="#65a30d" />
              </linearGradient>
              <linearGradient id="grad-bottom-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" />
                <stop offset="100%" stop-color="#047857" />
              </linearGradient>
              <linearGradient id="grad-bottom-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f97316" />
                <stop offset="100%" stop-color="#b91c1c" />
              </linearGradient>
              <linearGradient id="grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#facc15" />
                <stop offset="100%" stop-color="#ea580c" />
              </linearGradient>
              <linearGradient id="grad-u-shape" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9" />
                <stop offset="100%" stop-color="#0284c7" />
              </linearGradient>
            </defs>
            <path d="M 48,108 L 100,138 L 152,108 L 152,150 A 52,52 0 0,1 48,150 Z" fill="url(#grad-u-shape)" />
            <path d="M 100,10 L 48,40 L 90,53 Z" fill="url(#grad-top-left)" />
            <path d="M 100,10 L 110,53 L 152,40 Z" fill="url(#grad-top-right)" />
            <path d="M 152,40 L 120,70 L 152,100 Z" fill="url(#grad-right)" />
            <path d="M 152,100 L 110,87 L 100,130 Z" fill="url(#grad-bottom-right)" />
            <path d="M 100,130 L 90,87 L 48,100 Z" fill="url(#grad-bottom-left)" />
            <path d="M 48,100 L 80,70 L 48,40 Z" fill="url(#grad-left)" />
          </svg>
          <span style="font-weight: 800; font-size: 1.3rem;"><span data-i18n="brand_title"></span> <span style="font-weight:300; font-size:1.1rem">DAICO</span></span>
        </div>
        <span class="sdaia-badge" data-i18n="brand_badge" style="border-right: 1px solid var(--border-color); padding-right: var(--space-sm); margin-right: 2px; font-size: 0.75rem; color: var(--text-muted); font-weight: 500; white-space: nowrap;"></span>
      </div>
      
      <nav>
        <ul class="nav-menu" id="nav-menu">
          <li><a href="#about" class="nav-link" data-i18n="nav_about"></a></li>
          <li><a href="#programs" class="nav-link" data-i18n="nav_programs"></a></li>
          <li><a href="#trainers" class="nav-link" data-i18n="nav_trainers"></a></li>
          <li><a href="#faqs" class="nav-link" data-i18n="nav_faqs"></a></li>
          <li><a href="#contact" class="nav-link" data-i18n="nav_contact"></a></li>
        </ul>
      </nav>

      <div class="nav-actions">
        <!-- Theme Toggle button -->
        <button id="theme-toggle" class="theme-toggle" aria-label="تبديل المظهر">
          <!-- Icon injected dynamically -->
        </button>

        <a href="auth/login.html" class="btn btn-ghost btn-sm" style="font-weight:700" data-i18n="btn_login"></a>
        <a href="auth/register.html" class="btn btn-primary btn-sm" style="font-weight:700" data-i18n="btn_register"></a>

        <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="القائمة">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section — 5 facet-colored glow blobs (brief §4 HOMEPAGE) -->
  <section class="hero-section">
    <div class="hero-glow-1"></div>
    <div class="hero-glow-2"></div>
    <div class="hero-glow-3"></div>
    <div class="hero-glow-4"></div>
    <div class="hero-glow-5"></div>
    
    <div class="hero-grid-container">
      <div class="hero-text-content">
        <div class="hero-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          <span data-i18n="hero_badge"></span>
        </div>
        <h1 class="hero-title" data-i18n="hero_title"></h1>
        <p class="hero-desc" data-i18n="hero_desc"></p>
        <div class="hero-cta">
          <a href="#programs" class="btn btn-primary" style="padding: 0.8rem 1.8rem" data-i18n="btn_discover"></a>
          <a href="auth/register.html" class="btn btn-ghost" style="padding: 0.8rem 1.8rem" data-i18n="btn_participate"></a>
        </div>
        
        <!-- Founding Partners / Strategic Initiative -->
        <div class="hero-partners">
          <div class="partners-divider">
            <span data-i18n="partners_title"></span>
          </div>
          <div class="partners-logos">
            <a href="https://ksu.edu.sa/" target="_blank" rel="noopener noreferrer" class="partner-card" title="جامعة الملك سعود | King Saud University">
              <div class="partner-logo-container">
                <img src="images/ksu-logo.png" alt="جامعة الملك سعود" class="partner-logo-img">
              </div>
              <div class="partner-card-action">
                <svg class="icon-globe" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                <span data-i18n="visit_site"></span>
                <svg class="icon-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              </div>
            </a>
            
            <a href="https://sdaia.gov.sa/" target="_blank" rel="noopener noreferrer" class="partner-card" title="الهيئة السعودية للبيانات والذكاء الاصطناعي | سدايا">
              <div class="partner-logo-container">
                <img src="images/sdaia-logo.png" alt="SDAIA" class="partner-logo-img sdaia-logo-img">
              </div>
              <div class="partner-card-action">
                <svg class="icon-globe" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                <span data-i18n="visit_site"></span>
                <svg class="icon-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              </div>
            </a>
          </div>
        </div>
      </div>
      
      <div class="hero-visual-content">
        <div class="hero-logo-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" class="hero-daico-logo">
            <defs>
              <linearGradient id="hero-grad-top-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#5ec2f6" />
                <stop offset="100%" stop-color="#2a86c7" />
              </linearGradient>
              <linearGradient id="hero-grad-top-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3ba8e8" />
                <stop offset="100%" stop-color="#1e6091" />
              </linearGradient>
              <linearGradient id="hero-grad-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a3e635" />
                <stop offset="100%" stop-color="#65a30d" />
              </linearGradient>
              <linearGradient id="hero-grad-bottom-right" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" />
                <stop offset="100%" stop-color="#047857" />
              </linearGradient>
              <linearGradient id="hero-grad-bottom-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f97316" />
                <stop offset="100%" stop-color="#b91c1c" />
              </linearGradient>
              <linearGradient id="hero-grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#facc15" />
                <stop offset="100%" stop-color="#ea580c" />
              </linearGradient>
              <linearGradient id="hero-grad-u-shape" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9" />
                <stop offset="100%" stop-color="#0284c7" />
              </linearGradient>
            </defs>
            <path d="M 48,108 L 100,138 L 152,108 L 152,150 A 52,52 0 0,1 48,150 Z" fill="url(#hero-grad-u-shape)" />
            <path d="M 100,10 L 48,40 L 90,53 Z" fill="url(#hero-grad-top-left)" />
            <path d="M 100,10 L 110,53 L 152,40 Z" fill="url(#hero-grad-top-right)" />
            <path d="M 152,40 L 120,70 L 152,100 Z" fill="url(#hero-grad-right)" />
            <path d="M 152,100 L 110,87 L 100,130 Z" fill="url(#hero-grad-bottom-right)" />
            <path d="M 100,130 L 90,87 L 48,100 Z" fill="url(#hero-grad-bottom-left)" />
            <path d="M 48,100 L 80,70 L 48,40 Z" fill="url(#hero-grad-left)" />
          </svg>
        </div>
      </div>
    </div>
  </section>

  <!-- Success Statistics — Facet-colored icons + count-up (brief §4 HOMEPAGE) -->
  <section class="stats-section">
    <div class="stats-grid">
      <div class="stat-item animate-in">
        <div class="stat-icon facet-sky">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </div>
        <span class="stat-number" id="stat-students" data-target="12500">0</span>
        <span class="stat-label" data-i18n="stat_students"></span>
      </div>
      <div class="stat-item animate-in" style="transition-delay: 0.1s">
        <div class="stat-icon facet-amber">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        </div>
        <span class="stat-number" id="stat-courses" data-target="140">0</span>
        <span class="stat-label" data-i18n="stat_courses"></span>
      </div>
      <div class="stat-item animate-in" style="transition-delay: 0.2s">
        <div class="stat-icon facet-lime">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
        </div>
        <span class="stat-number" id="stat-trainers" data-target="25">0</span>
        <span class="stat-label" data-i18n="stat_trainers"></span>
      </div>
      <div class="stat-item animate-in" style="transition-delay: 0.3s">
        <div class="stat-icon facet-emerald">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <span class="stat-number" id="stat-employment" data-target="94">0</span>
        <span class="stat-label" data-i18n="stat_employment"></span>
      </div>
    </div>
  </section>

  <!-- About Section — facet-colored icons (brief §1: accent palette for card icons) -->
  <section id="about" class="section">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="about_subtitle"></span>
      <h2 class="section-title" data-i18n="about_title"></h2>
      <p class="section-desc" data-i18n="about_desc"></p>
    </div>
    
    <div class="about-grid">
      <div class="about-card animate-in">
        <div class="about-card-icon facet-sky">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        </div>
        <h3 data-i18n="about_card1_title"></h3>
        <p data-i18n="about_card1_desc"></p>
      </div>
      <div class="about-card animate-in" style="transition-delay: 0.1s">
        <div class="about-card-icon facet-amber">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </div>
        <h3 data-i18n="about_card2_title"></h3>
        <p data-i18n="about_card2_desc"></p>
      </div>
      <div class="about-card animate-in" style="transition-delay: 0.2s">
        <div class="about-card-icon facet-emerald">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <h3 data-i18n="about_card3_title"></h3>
        <p data-i18n="about_card3_desc"></p>
      </div>
    </div>
  </section>

  <!-- Featured Programs Section -->
  <section id="programs" class="section" style="background-color: var(--bg-tertiary); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); max-width: 100%">
    <div style="max-width:1200px; margin:0 auto">
      <div class="section-header">
        <span class="section-subtitle" data-i18n="programs_subtitle"></span>
        <h2 class="section-title" data-i18n="programs_title"></h2>
        <p class="section-desc" data-i18n="programs_desc"></p>
      </div>

      <!-- Filters Tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-type="all" data-i18n="filter_all"></button>
        <button class="filter-tab" data-type="course" data-i18n="filter_course"></button>
        <button class="filter-tab" data-type="bootcamp" data-i18n="filter_bootcamp"></button>
        <button class="filter-tab" data-type="hackathon" data-i18n="filter_hackathon"></button>
        <button class="filter-tab" data-type="workshop" data-i18n="filter_workshop"></button>
      </div>

      <!-- Programs Grid -->
      <div class="programs-grid" id="programs-container">
        <!-- Rendered dynamically by main.js -->
      </div>
    </div>
  </section>

  <!-- Trainers Section -->
  <section id="trainers" class="section">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="trainers_subtitle"></span>
      <h2 class="section-title" data-i18n="trainers_title"></h2>
      <p class="section-desc" data-i18n="trainers_desc"></p>
    </div>

    <div class="trainers-grid">
      <!-- Trainer Card 1 — facet ring: sky blue (brief §4: colored ring per trainer) -->
      <div class="card trainer-card animate-in">
        <img class="trainer-photo-large" src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=120" alt="Trainer 1">
        <h3 style="font-size:1.15rem; margin-bottom:var(--space-xs)" data-i18n="trainer1_name"></h3>
        <span style="font-size:0.8rem; color:var(--facet-sky-deep); font-weight:700; margin-bottom:var(--space-sm)" data-i18n="trainer1_role"></span>
        <p style="font-size:0.85rem; color:var(--text-secondary)" data-i18n="trainer1_desc"></p>
        <span style="font-size:0.8rem; color:var(--text-muted); margin-top:var(--space-md)" data-i18n="trainer1_rating"></span>
      </div>

      <!-- Trainer Card 2 — facet ring: amber -->
      <div class="card trainer-card animate-in" style="transition-delay: 0.1s">
        <img class="trainer-photo-large" src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=120" alt="Trainer 2">
        <h3 style="font-size:1.15rem; margin-bottom:var(--space-xs)" data-i18n="trainer2_name"></h3>
        <span style="font-size:0.8rem; color:var(--facet-amber-deep); font-weight:700; margin-bottom:var(--space-sm)" data-i18n="trainer2_role"></span>
        <p style="font-size:0.85rem; color:var(--text-secondary)" data-i18n="trainer2_desc"></p>
        <span style="font-size:0.8rem; color:var(--text-muted); margin-top:var(--space-md)" data-i18n="trainer2_rating"></span>
      </div>

      <!-- Trainer Card 3 — facet ring: lime -->
      <div class="card trainer-card animate-in" style="transition-delay: 0.2s">
        <img class="trainer-photo-large" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=120" alt="Trainer 3">
        <h3 style="font-size:1.15rem; margin-bottom:var(--space-xs)" data-i18n="trainer3_name"></h3>
        <span style="font-size:0.8rem; color:var(--facet-lime-deep); font-weight:700; margin-bottom:var(--space-sm)" data-i18n="trainer3_role"></span>
        <p style="font-size:0.85rem; color:var(--text-secondary)" data-i18n="trainer3_desc"></p>
        <span style="font-size:0.8rem; color:var(--text-muted); margin-top:var(--space-md)" data-i18n="trainer3_rating"></span>
      </div>
    </div>
  </section>

  <!-- Testimonials Section -->
  <section class="section" style="background-color: var(--bg-tertiary); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); max-width: 100%">
    <div style="max-width:1200px; margin:0 auto">
      <div class="section-header">
        <span class="section-subtitle" data-i18n="success_subtitle"></span>
        <h2 class="section-title" data-i18n="success_title"></h2>
      </div>

      <div class="testimonials-container">
        <!-- Testimonial 1 -->
        <div class="testimonial-slide active">
          <p class="testimonial-quote" data-i18n="success_q1"></p>
          <strong style="font-size:1rem; color:var(--text-primary)" data-i18n="success_name1"></strong>
          <p style="font-size:0.8rem; color:var(--text-muted)" data-i18n="success_role1"></p>
        </div>

        <!-- Testimonial 2 -->
        <div class="testimonial-slide">
          <p class="testimonial-quote" data-i18n="success_q2"></p>
          <strong style="font-size:1rem; color:var(--text-primary)" data-i18n="success_name2"></strong>
          <p style="font-size:0.8rem; color:var(--text-muted)" data-i18n="success_role2"></p>
        </div>
      </div>

      <!-- Partners Scrolling logos -->
      <div style="margin-top:var(--space-2xl); border-top:1px solid var(--border-color); padding-top:var(--space-xl)">
        <p class="text-center" style="font-size:0.8rem; color:var(--text-muted); margin-bottom:var(--space-lg); text-transform:uppercase" data-i18n="partners_scroll_title"></p>
        <div class="partners-grid">
          <img class="partner-logo" src="images/ksu-logo.png" alt="جامعة الملك سعود">
          <img class="partner-logo" src="images/sdaia-logo.png" alt="سدايا">
        </div>
      </div>
    </div>
  </section>

  <!-- FAQ Section -->
  <section id="faqs" class="section">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="faq_subtitle"></span>
      <h2 class="section-title" data-i18n="faq_title"></h2>
    </div>

    <div class="faq-container">
      <div class="faq-item">
        <button class="faq-question">
          <span data-i18n="faq_q1"></span>
          <span>➕</span>
        </button>
        <div class="faq-answer">
          <p data-i18n="faq_a1"></p>
        </div>
      </div>
      
      <div class="faq-item">
        <button class="faq-question">
          <span data-i18n="faq_q2"></span>
          <span>➕</span>
        </button>
        <div class="faq-answer">
          <p data-i18n="faq_a2"></p>
        </div>
      </div>

      <div class="faq-item">
        <button class="faq-question">
          <span data-i18n="faq_q3"></span>
          <span>➕</span>
        </button>
        <div class="faq-answer">
          <p data-i18n="faq_a3"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Contact Form Section -->
  <section id="contact" class="section" style="border-top:1px solid var(--border-color)">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="contact_subtitle"></span>
      <h2 class="section-title" data-i18n="contact_title"></h2>
    </div>

    <div class="contact-grid">
      <div class="contact-info">
        <h3 data-i18n="contact_info"></h3>
        <p style="color:var(--text-secondary); margin-bottom:var(--space-md)" data-i18n="contact_desc"></p>
        
        <div class="info-item">
          <div class="info-icon">📍</div>
          <div>
            <strong data-i18n="contact_addr"></strong>
            <p style="font-size:0.9rem; color:var(--text-secondary)" data-i18n="contact_addr_val"></p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">✉</div>
          <div>
            <strong data-i18n="contact_email"></strong>
            <p style="font-size:0.9rem; color:var(--text-secondary)">info@daico.edu.sa</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">📞</div>
          <div>
            <strong data-i18n="contact_phone"></strong>
            <p style="font-size:0.9rem; color:var(--text-secondary)">+966 11 400 9000</p>
          </div>
        </div>
      </div>

      <div class="card" style="padding:var(--space-xl)">
        <div id="contact-alert-container"></div>
        <form class="auth-form" id="contact-form">
          <div class="form-group">
            <label class="form-label" for="contact-name" data-i18n="form_name"></label>
            <input type="text" id="contact-name" class="form-control" data-i18n-placeholder="contact_name_ph" placeholder="" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-email" data-i18n="form_email"></label>
            <input type="email" id="contact-email" class="form-control" placeholder="example@domain.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-message" data-i18n="form_msg"></label>
            <textarea id="contact-message" class="form-control" style="min-height:120px; resize:vertical" data-i18n-placeholder="contact_msg_ph" placeholder="" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full" data-i18n="btn_send"></button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-brand">
        <h3 style="color:var(--primary); font-size:1.5rem">دايكو DAICO</h3>
        <p style="font-size:0.875rem; color:var(--text-secondary)" data-i18n="footer_desc"></p>
      </div>
      
      <div class="footer-links-column">
        <span class="footer-links-title" data-i18n="footer_links"></span>
        <ul class="footer-links-list">

          <li><a href="#programs" class="footer-link" data-i18n="footer_programs"></a></li>
          <li><a href="#trainers" class="footer-link" data-i18n="footer_team"></a></li>
        </ul>
      </div>

      <div class="footer-links-column">
        <span class="footer-links-title" data-i18n="footer_rules"></span>
        <ul class="footer-links-list">
          <li><a href="#" class="footer-link" data-i18n="footer_privacy"></a></li>
          <li><a href="#" class="footer-link" data-i18n="footer_terms"></a></li>
          <li><a href="#" class="footer-link" data-i18n="footer_cert"></a></li>
        </ul>
      </div>
    </div>

    <div class="footer-bottom">
      <span data-i18n="footer_copyright"></span>
      <span data-i18n="footer_saudi"></span>
    </div>

  <!-- Toast container for transient notifications (brief §5) -->
  <div class="toast-container" id="toast-container"></div>

</body>
</html>
